name: CI SweetlyAPI
on: [push]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: npm rebuild sqlite3
      - name: Gerar Relatorio de Metricas
        run: node ./node_modules/jest/bin/jest.js --coverage
        env:
          NODE_ENV: test